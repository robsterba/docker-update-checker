services:
  update-checker:
    build: .
    container_name: docker-update-checker
    restart: unless-stopped
    ports:
      - "5000:5000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      # Docker socket — required for pulling images and running compose
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount your entire compose root (adjust path as needed)
      - /home/rob/docker/:/compose:ro
    environment:
      # Path inside container where compose files live
      COMPOSE_ROOT: /compose
      # How often to auto-check (minutes)
      CHECK_INTERVAL_MINUTES: "60"
      LOG_LEVEL: INFO
